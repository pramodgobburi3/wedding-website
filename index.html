<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Snigdha &amp; Pramod — Wedding</title>
    <meta name="description" content="Join us to celebrate the wedding of Snigdha Madiraju and Pramod Gobburi on August 16, 2026 at the Waldorf Astoria Washington DC." />
    <meta name="theme-color" content="#2c4426" />

    <!-- Open Graph — controls how the link looks when shared on WhatsApp, iMessage, etc. -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://wedding.snigdhaandpramod.com" />
    <meta property="og:title"       content="Snigdha &amp; Pramod — Wedding" />
    <meta property="og:description" content="Join us to celebrate the wedding of Snigdha Madiraju and Pramod Gobburi on August 16, 2026 at the Waldorf Astoria Washington DC." />
    <!-- og:image — replace with a real photo URL once you have one uploaded to Cloudinary -->
    <!-- <meta property="og:image" content="https://res.cloudinary.com/YOUR_CLOUD/image/upload/w_1200,q_auto,f_auto/YOUR_PHOTO_ID" /> -->

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />

    <!-- Fonts — preconnect first, then load async to avoid render-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Dancing+Script:wght@600;700&family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Dancing+Script:wght@600;700&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
